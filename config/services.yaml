# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    _instanceof:
        App\Common\Interface\CommandHandlerInterface:
            public: true
        App\Tick\Interface\TickProcessorInterface:
            tags: [app.tick_processor]

    # T-082 / TickEngine-Wiring: alle TickProcessors als tagged_iterator injecten.
    App\Tick\Engine\TickEngine:
        arguments:
            $processors: !tagged_iterator app.tick_processor
        public: true

    App\Common\Service\CommandBus:
        arguments:
            $container: '@service_container'

    # T-062: Default Clock = SystemClock (Wall-Clock). Tests/Scenario können überschreiben.
    App\Common\Interface\ClockInterface:
        alias: App\Common\Service\SystemClock

    App\Simulation\Scenario\:
        resource: '../src/Simulation/Scenario/*'
        autowire: true
        autoconfigure: true
        public: true

    App\Simulation\Command\SimulateScenarioCommand:
        arguments:
            $container: '@service_container'

    # T-073: FactionSeedService wird direkt von IntegrationTestCase + (späteres) Console-Command aufgerufen
    # → public, damit der Compiler ihn nicht entfernt und Tests via getContainer() zugreifen können.
    App\Faction\Service\FactionSeedService:
        public: true

    App\Faction\Service\ReputationService:
        public: true

    # T-017: FleetArrivalService wird vom Tick-Scheduler (T-044) und Tests
    # direkt via Container aufgerufen.
    App\Fleet\Service\FleetArrivalService:
        public: true

    # T-016: SalvageProcessor (globaler Tick-Service analog FleetArrivalService).
    App\Ship\Service\SalvageProcessor:
        public: true

    # T-082: AdjustableClock public, damit Demo-Command direkt advance kann.
    App\Common\Service\AdjustableClock:
        public: true

    # T-018: TelescopeDiscoveryService — Demo-Command und Tick-Loop greifen direkt zu.
    App\Discovery\Service\TelescopeDiscoveryService:
        public: true

    # T-025: ResearchCompletionService analog FleetArrival/TelescopeDiscovery (Wallclock-Tick-Resolver).
    App\Research\Service\ResearchCompletionService:
        public: true

    # T-025: ResearchTree als public Singleton (StartResearchCommandService + Demo-CLI).
    App\Research\Service\ResearchTree:
        public: true

    # add more service definitions when explicit configuration is needed

when@demo:
    services:
        # T-082 Demo-Env: ClockInterface ist AdjustableClock (Time-Travel via advance).
        # Default-Constructor setzt now() — Demo-Command kann via reset() überschreiben.
        App\Common\Service\AdjustableClock:
            public: true
        App\Common\Interface\ClockInterface:
            alias: App\Common\Service\AdjustableClock
    # please note that last definitions always *replace* previous ones

when@test:
    services:
        # T-025 Tests: ClockInterface ist AdjustableClock damit Wallclock-Mechaniken
        # (Construction, Research, Salvage etc.) deterministisch via advanceSeconds()
        # getestet werden können. Default-Konstruktor setzt now() — verhält sich wie
        # SystemClock bis ein Test explizit advanced.
        App\Common\Service\AdjustableClock:
            public: true
        App\Common\Interface\ClockInterface:
            alias: App\Common\Service\AdjustableClock
