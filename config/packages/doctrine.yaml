doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true

        # Custom UUID-based identifier types for domain ValueObjects.
        # Each type stores as CHAR(36) and converts to/from the matching ID class.
        types:
            planet_id: App\Common\Doctrine\Type\PlanetIdType
            player_id: App\Common\Doctrine\Type\PlayerIdType
            building_id: App\Common\Doctrine\Type\BuildingIdType
            resource_id: App\Common\Doctrine\Type\ResourceIdType
            resource_deposit_id: App\Common\Doctrine\Type\ResourceDepositIdType
            solar_system_id: App\Common\Doctrine\Type\SolarSystemIdType
            faction_id: App\Common\Doctrine\Type\FactionIdType
            ship_id: App\Common\Doctrine\Type\ShipIdType
            probe_id: App\Common\Doctrine\Type\ProbeIdType
            fleet_id: App\Common\Doctrine\Type\FleetIdType
            poi_id: App\Common\Doctrine\Type\PoiIdType
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\MySQLPlatform: identity
        # Domain-Architecture: entities live under src/<Domain>/Model/, not src/Entity/.
        # We register App\ as one attribute-based mapping that scans all of src/.
        auto_mapping: false
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src'
                prefix: 'App'
                alias: App
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
